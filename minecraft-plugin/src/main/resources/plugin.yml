name: UmbrellaOS
version: 1.0.0
main: com.umbrellaos.plugin.UmbrellaPlugin
api-version: 1.20
depend: [ProtocolLib]
softdepend: [GrimAC]
commands:
  verify:
    description: Verify your Discord account
    usage: /verify
  disc:
    description: Send message to Discord (partial bridge mode)
    usage: /disc <message>
  lang:
    description: Set your chat language
    usage: /lang <language>
  translate:
    description: Toggle auto-translation
    usage: /translate <on|off>

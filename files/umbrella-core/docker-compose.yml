version: "3.9"

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: umbrella_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: umbrella
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: umbrella_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbrella -d umbrella_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: umbrella_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Umbrella Core ---
  core:
    build: .
    container_name: umbrella_core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://umbrella:changeme@postgres:5432/umbrella_core
      DATABASE_URL_SYNC: postgresql+psycopg2://umbrella:changeme@postgres:5432/umbrella_core
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8765:8765"
    volumes:
      - .:/app
    command: python main.py

volumes:
  postgres_data:
  redis_data:
